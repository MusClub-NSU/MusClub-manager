services:
  db:
    image: pgvector/pgvector:pg16
    container_name: musclub_pg
    environment:
      POSTGRES_DB: musclub
      POSTGRES_USER: musclub
      POSTGRES_PASSWORD: musclub
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U musclub -d musclub" ]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: musclub_keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: musclub
      KC_DB_PASSWORD: musclub
      KC_HTTP_PORT: 8180
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "timeout 3 bash -lc '</dev/tcp/127.0.0.1/8180' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: musclub_app
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/musclub
      SPRING_DATASOURCE_USERNAME: musclub
      SPRING_DATASOURCE_PASSWORD: musclub
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/musclub
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8180/realms/musclub/protocol/openid-connect/certs
      KEYCLOAK_BASE_URL: http://keycloak:8180
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      VAPID_PUBLIC_KEY: ""
      VAPID_PRIVATE_KEY: ""
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  frontend:
    build:
      context: ../musclub-app
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://app:8080
    container_name: musclub_frontend
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-demo-secret-change-me
      KEYCLOAK_ISSUER: http://localhost:8180/realms/musclub
      KEYCLOAK_INTERNAL_ISSUER: http://keycloak:8180/realms/musclub
      KEYCLOAK_CLIENT_ID: musclub-frontend
      BACKEND_INTERNAL_URL: http://app:8080
    ports:
      - "3000:3000"
    depends_on:
      app:
        condition: service_started
      keycloak:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 12
