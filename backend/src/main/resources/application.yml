spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/musclub}
    username: ${SPRING_DATASOURCE_USERNAME:musclub}
    password: ${SPRING_DATASOURCE_PASSWORD:musclub}
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak issuer URI: http://<host>/realms/<realm-name>
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/musclub}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false
  flyway:
    enabled: true

push:
  vapid-public-key: ${VAPID_PUBLIC_KEY:}
  vapid-private-key: ${VAPID_PRIVATE_KEY:}
  vapid-subject: mailto:admin@musclub.nsu.ru
  notification-icon: /icon-192x192.png
  notification-badge: /icon-192x192.png
  max-retries: 3
  scheduler-interval: 30000
  notification-retention-days: 30
  default-reminder-intervals: 1440, 120, 15

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api/docs
  pageable-converter:
    enabled: true
  sort-converter:
    enabled: true

logging:
  level:
    com.nsu.musclub: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

deepseek:
  api-url: https://api.deepseek.com/v1/chat/completions
  api-key: ${DEEPSEEK_API_KEY:test-api-key-for-testing-only}
  model: deepseek-chat

search:
  embedding-dimensions: ${SEARCH_EMBEDDING_DIMENSIONS:256}
  hybrid:
    lexical-weight: ${SEARCH_HYBRID_LEXICAL_WEIGHT:0.5}
    vector-weight: ${SEARCH_HYBRID_VECTOR_WEIGHT:0.5}
    min-vector-score: ${SEARCH_HYBRID_MIN_VECTOR_SCORE:0.1}

