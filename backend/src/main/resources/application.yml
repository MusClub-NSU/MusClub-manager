    url: jdbc:postgresql://localhost:5433/musclub
    username: musclub
    password: musclub
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false
  flyway:
    enabled: false

push:
  vapid-public-key: "BKyxePrCfhVrA9q28oJXhbXxkHEyOxfK4L0G5-ZmEZwuBr4X3BSyRcjREBw89hm8XZRYVfCD0grkZaajqatVV6k"
  vapid-private-key: "_klgyoDWGo0d1zT_THS5uAKrZ5ofvO67U1AE6TBz9H8"
  vapid-subject: mailto:admin@musclub.nsu.ru
  notification-icon: /icon-192x192.png
